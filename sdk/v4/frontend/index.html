<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Prueba de Autorización jain</title>
    </head>
    <body>
        <h1>Registro de usuarios V4</h1>
        <fieldset style="margin-bottom: 15px; padding: 10px;">
            <legend>Crear Cuenta Nueva</legend>
            <label>Usuario:</label>
            <input id="regUser" required><br>
            <label>Password:</label>
            <input type="password" id="regPass" required><br>
            <button id="btnRegister">Crear usuario</button>
        </fieldset>

        <hr>
        <h2>Control de Sesión (Login / Logout)</h2>
        <fieldset style="margin-bottom: 15px; padding: 10px;">
            <legend>Credenciales de Acceso</legend>
            <label>Usuario:</label>
            <input id="txtUser" value="test_user" placeholder="Usuario de la BD">
            <label>Password:</label>
            <input type="password" id="txtPass" value="123456" placeholder="Contraseña">
            <button id="btnLogin">Iniciar Sesión</button>
            <button id="btnLogout" disabled>Cerrar Sesión</button>
            <span id="sessionStatus" style="margin-left:15px; font-weight:bold; color:red;">Sesión Cerrada</span>
        </fieldset>
        <hr>
        <h2>Panel de Pruebas de Permisos (Usuario: admin)</h2>
        <button id="btnLog">Ejecutar /log (Permitido)</button>
        <button id="btnHello">Ejecutar /sayHello (Denegado)</button>
        
        <div id="resultado" style="margin-top: 15px; font-weight: bold;"></div>
    </body>

   <script>
    const BASE_URL = "http://localhost:3000";
    
    
    let currentUserId = null; 
    let currentApiKey = null; 

   function realizarPeticion(endpoint) 
    { 
        const resDiv = document.getElementById("resultado");
        resDiv.style.color = "black";
        resDiv.innerText = "Enviando petición a " + endpoint + "...";

        const xhr = new XMLHttpRequest();
        xhr.open("GET", BASE_URL + endpoint, true);
        
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.setRequestHeader("x-user-id", currentUserId);
        xhr.setRequestHeader("x-api-key", currentApiKey);
        xhr.setRequestHeader("x-api-version", "1.0"); // Inyeccion obligatoria de version

        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                try {
                    const data = JSON.parse(xhr.responseText);
                    if (xhr.status >= 200 && xhr.status < 300) {
                        resDiv.style.color = "green";
                        resDiv.innerText = "Respuesta del Servidor: " + (data.message || JSON.stringify(data));
                    } else {
                        resDiv.style.color = "red";
                        // Lectura de la estructura 
                        resDiv.innerText = "Error HTTP " + xhr.status + " [" + data.exception + "]: " + data.detail;
                    }
                } catch (err) {
                    resDiv.style.color = "red";
                    resDiv.innerText = "Error al procesar respuesta: " + xhr.responseText;
                }
            }
        };
        xhr.send();
    }

   function onBtnRegisterClick() {
        const u = document.getElementById("regUser").value;
        const p = document.getElementById("regPass").value;
        const resDiv = document.getElementById("resultado");

        if (!u || !p) {
            resDiv.innerText = "Por favor, completa ambos campos de registro.";
            resDiv.style.color = "red";
            return;
        }

        resDiv.style.color = "black";
        resDiv.innerText = "Procesando registro en el servidor...";

        const xhr = new XMLHttpRequest();
        // Cambiar metodo de GET a POST ---
        xhr.open("POST", BASE_URL + "/register", true);
        
        // Asegurar cabeceras correctas (Content-Type y Version) ---
        xhr.setRequestHeader("Content-Type", "application/json"); // Obligatorio para enviar JSON
        xhr.setRequestHeader("x-api-version", "1.0"); // Cabecera requerida por Punto 3

        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                try {
                    const data = JSON.parse(xhr.responseText);
                    // 
                    if (xhr.status === 200 && !data.exception) {
                        resDiv.style.color = "green";
                        resDiv.innerText = "Usuario creado con éxito. ID asignado: " + data.userId;
                        document.getElementById("regUser").value = "";
                        document.getElementById("regPass").value = "";
                    } else {
                        resDiv.style.color = "red";
                        
                        resDiv.innerText = "Fallo en Registro [" + data.exception + "]: " + data.detail;
                    }
                } catch (e) {
                    resDiv.style.color = "red";
                    resDiv.innerText = "Error de conexión o respuesta inválida del servidor.";
                }
            }
        };

      
        const payload = {
            username: u,
            password: p
        };
        xhr.send(JSON.stringify(payload)); // envia la cadena JSON
    }

    function onBtnLoginClick() {
        const u = document.getElementById("txtUser").value;
        const p = document.getElementById("txtPass").value;
        const resDiv = document.getElementById("resultado");

        // Simulacion
        // El usuario 'admin' tiene id '2', cualquier otro simulará id '1' ('test_user')
        currentUserId = (u === "admin") ? "2" : "1"; 
        currentApiKey = p; 

        document.getElementById("sessionStatus").innerText = "Credenciales Listas (ID: " + currentUserId + ")";
        document.getElementById("sessionStatus").style.color = "green";
        document.getElementById("btnLogin").disabled = true;
        document.getElementById("btnLogout").disabled = false;
        resDiv.innerText = "Variables de cabecera HTTP configuradas de forma transversal.";
        resDiv.style.color = "green";
    }

    function onBtnLogoutClick() 
    {
        currentUserId = null;
        currentApiKey = null;
        document.getElementById("sessionStatus").innerText = "Sesión Cerrada";
        document.getElementById("sessionStatus").style.color = "red";
        document.getElementById("btnLogin").disabled = false;
        document.getElementById("btnLogout").disabled = true;
        document.getElementById("resultado").innerText = "Cabeceras de autenticación limpiadas del frontend.";
        document.getElementById("resultado").style.color = "black";
    }

    function onBtnLogClick() {
        realizarPeticion("/log");
    }

    function onBtnHelloClick() {
        realizarPeticion("/sayHello");
    }

    function main() {
        document.getElementById("btnLog").onclick = onBtnLogClick;
        document.getElementById("btnHello").onclick = onBtnHelloClick;

        document.getElementById("btnLogin").onclick = onBtnLoginClick;
        document.getElementById("btnLogout").onclick = onBtnLogoutClick;
        
        document.getElementById("btnRegister").onclick = onBtnRegisterClick;
    }

    window.onload = main;
    </script>
</html>
